<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Penyusun FINAL AUTO SAVE FIX</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            background-color: #f2f2f2;
            margin: 0;
            padding: 15px;
            color: #000;
        }
        h2 {
            font-size: 22px;
            margin-top: 5px;
            margin-bottom: 15px;
            font-weight: bold;
        }
        .textarea-container {
            background: #fff;
            border-radius: 8px;
            border: 1px solid #ccc;
            padding: 2px;
            margin-bottom: 15px;
        }
        textarea {
            width: 100%;
            height: 250px;
            border: none;
            outline: none;
            resize: vertical;
            padding: 10px;
            box-sizing: border-box;
            font-family: monospace;
            font-size: 14px;
            line-height: 1.4;
        }
        .main-buttons {
            display: flex;
            gap: 10px;
            margin-bottom: 20px;
            flex-wrap: wrap;
        }
        .btn {
            border: none;
            border-radius: 6px;
            padding: 10px 15px;
            color: #fff;
            font-size: 14px;
            font-weight: 500;
            cursor: pointer;
        }
        .btn-blue { background-color: #0d6efd; }
        .btn-green { background-color: #198754; }
        .btn-red { background-color: #dc3545; }
        .btn:active { opacity: 0.8; }

        .card {
            background-color: #fff;
            border-radius: 8px;
            padding: 20px;
            margin-bottom: 15px;
            box-shadow: 0 1px 2px rgba(0,0,0,0.05);
        }
        .card-number {
            font-size: 18px;
            font-weight: bold;
            margin-bottom: 15px;
        }
        .card-actions {
            display: flex;
            gap: 10px;
            margin-bottom: 15px;
        }
        .btn-small {
            border: none;
            border-radius: 4px;
            padding: 6px 12px;
            color: #fff;
            font-size: 13px;
            cursor: pointer;
            display: flex;
            align-items: center;
            gap: 5px;
        }
        .card-content {
            white-space: pre-line;
            font-family: Arial, sans-serif;
            font-size: 15px;
            line-height: 1.5;
            margin: 0;
        }
    </style>
</head>
<body>

    <h2>Penyusun FINAL AUTO SAVE FIX</h2>
    
    <div class="textarea-container">
        <textarea id="inputData" placeholder="Masukkan data di sini..."></textarea>
    </div>
    
    <div class="main-buttons">
        <button class="btn btn-blue" onclick="prosesData()">Proses Semua</button>
        <button class="btn btn-green" onclick="salinSemua()">Salin Semua</button>
        <button class="btn btn-red" onclick="hapusSemua()">Hapus Semua</button>
    </div>

    <div id="outputContainer"></div>

<script>
    const inputData = document.getElementById('inputData');
    const outputContainer = document.getElementById('outputContainer');
    let dataTerolah = [];

    // FIX AUTO SAVE: Saat halaman dimuat/di-refresh, langsung tampilkan kembali datanya
    window.onload = function() {
        const savedData = localStorage.getItem('autoSaveData');
        if (savedData) {
            inputData.value = savedData;
            prosesData(); // Otomatis memproses data lama tanpa perlu klik tombol lagi
        }
    };

    // Menyimpan ketikan secara otomatis ke memori browser
    inputData.addEventListener('input', function() {
        localStorage.setItem('autoSaveData', this.value);
    });

    function prosesData() {
        try {
            outputContainer.innerHTML = ''; 
            dataTerolah = [];
            const rawInput = inputData.value;
            
            if (!rawInput.trim()) return;

            const cleanInput = rawInput.replace(/[\u200B-\u200D\uFEFF]/g, '');
            const lines = cleanInput.split('\n').map(b => b.trim()).filter(b => b !== '');
            
            let currentBlock = [];

            for (let i = 0; i < lines.length; i++) {
                let matchWilayah = lines[i].match(/\*([^*]{8,})\*/);

                if (matchWilayah) {
                    if (currentBlock.length > 0) dataTerolah.push(parseBlock(currentBlock));
                    currentBlock = [lines[i]];
                } else if (currentBlock.length > 0) {
                    currentBlock.push(lines[i]);
                }
            }
            if (currentBlock.length > 0) dataTerolah.push(parseBlock(currentBlock));

            if (dataTerolah.length === 0) {
                outputContainer.innerHTML = '<div style="background:#f8d7da; color:#842029; padding:15px; border-radius:6px; margin-bottom:15px;"><b>Gagal:</b> Tidak ada format *NAMA WILAYAH* ditemukan.</div>';
                return;
            }

            dataTerolah.sort((a, b) => a.wilayah.localeCompare(b.wilayah));

            dataTerolah.forEach((data, index) => {
                const noUrut = index + 1;
                const teksTampil = `${data.wilayah}\n\n${data.nik}\n${data.gender}\n${data.tglLahir}\n\n${data.status}\n${data.nominal}\n${data.instansi}\n${data.tanggalKerja}`;

                const card = document.createElement('div');
                card.className = 'card';

                const cardNumber = document.createElement('div');
                cardNumber.className = 'card-number';
                cardNumber.textContent = noUrut;

                const cardActions = document.createElement('div');
                cardActions.className = 'card-actions';

                const btnSalin = document.createElement('button');
                btnSalin.className = 'btn-small btn-green';
                btnSalin.textContent = '📋 Salin';
                btnSalin.onclick = () => salinKeClipboard(teksTampil, btnSalin, '📋 Salin');

                const btnHapus = document.createElement('button');
                btnHapus.className = 'btn-small btn-red';
                btnHapus.textContent = '🗑️ Hapus';
                btnHapus.onclick = () => card.remove();

                cardActions.appendChild(btnSalin);
                cardActions.appendChild(btnHapus);

                const cardContent = document.createElement('div');
                cardContent.className = 'card-content';
                cardContent.textContent = teksTampil;

                card.appendChild(cardNumber);
                card.appendChild(cardActions);
                card.appendChild(cardContent);

                outputContainer.appendChild(card);
            });

        } catch (error) {
            outputContainer.innerHTML = '<div style="background:#f8d7da; color:#842029; padding:15px; border-radius:6px;"><b>Kesalahan:</b> ' + error.message + '</div>';
        }
    }

    function parseBlock(blockLines) {
        let match = blockLines[0].match(/\*([^*]+)\*/);
        let wilayah = match ? `*${match[1]}*` : blockLines[0];

        let dataLines = blockLines.slice(1);
        
        let startIndex = dataLines.findIndex(l => /^\d{6,}/.test(l.replace(/\s/g, '')));
        if (startIndex === -1) startIndex = 0; 

        let nik = dataLines[startIndex] ? dataLines[startIndex].replace(/\s/g, '').substring(0, 6) : '';
        let gender = dataLines[startIndex + 1] || '';
        let tglLahir = dataLines[startIndex + 2] || '';
        let status = dataLines[startIndex + 3] || '';
        let nominal = dataLines[startIndex + 4] || '';
        let instansi = dataLines[startIndex + 5] || '';
        let tanggalKerja = dataLines[startIndex + 6] || '';

        return { wilayah, nik, gender, tglLahir, status, nominal, instansi, tanggalKerja };
    }

    function salinSemua() {
        if (dataTerolah.length === 0) {
            alert("Tidak ada data untuk disalin. Proses data terlebih dahulu!");
            return;
        }
        let semuaTeks = dataTerolah.map((data) => {
            return `${data.wilayah}\n\n${data.nik}\n${data.gender}\n${data.tglLahir}\n\n${data.status}\n${data.nominal}\n${data.instansi}\n${data.tanggalKerja}`;
        }).join('\n\n\n');
        
        salinKeClipboard(semuaTeks, document.querySelector('.btn-green'), 'Salin Semua');
    }

    function hapusSemua() {
        if (confirm("Apakah Anda yakin ingin menghapus semua data input dan hasil?")) {
            inputData.value = '';
            outputContainer.innerHTML = '';
            localStorage.removeItem('autoSaveData');
            dataTerolah = [];
        }
    }

    function salinKeClipboard(teks, tombol, teksAwal) {
        if (navigator.clipboard && window.isSecureContext) {
            navigator.clipboard.writeText(teks).then(berhasil).catch(fallbackCopy);
        } else {
            fallbackCopy();
        }

        function fallbackCopy() {
            const textarea = document.createElement('textarea');
            textarea.value = teks;
            textarea.style.position = 'fixed';
            document.body.appendChild(textarea);
            textarea.select();
            try {
                document.execCommand('copy');
                berhasil();
            } catch (err) {
                alert('Gagal menyalin data secara otomatis.');
            }
            document.body.removeChild(textarea);
        }

        function berhasil() {
            tombol.textContent = '✅ Tersalin';
            setTimeout(() => {
                tombol.textContent = teksAwal;
            }, 2000);
        }
    }
</script>

</body>
</html>
